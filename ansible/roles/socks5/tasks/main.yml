- name: Enable the EPEL repository (provides dante-server, fail2ban)
  dnf:
    name: oracle-epel-release-el9
    state: present

- name: Install dante (sockd), fail2ban, dnf-automatic, firewalld
  dnf:
    name: [dante-server, fail2ban, dnf-automatic, firewalld]
    state: present
    update_cache: true
    enablerepo: ol9_developer_EPEL

- name: Create SOCKS auth user (username mode only)
  user:
    name: "{{ socks_username }}"
    password: "{{ socks_password | password_hash('sha512') }}"
    shell: /sbin/nologin
  when: socks_auth_method == 'username' and socks_password | length > 0

- name: Render sockd.conf
  template:
    src: sockd.conf.j2
    dest: /etc/sockd.conf
    mode: "0644"
  notify: restart sockd

- name: Ensure firewalld is enabled and running
  systemd:
    name: firewalld
    enabled: true
    state: started

- name: Allow SSH and SOCKS from client CIDR only (firewalld rich rules)
  firewalld:
    rich_rule: "rule family=ipv4 source address={{ client_cidr }} port port={{ item }} protocol=tcp accept"
    permanent: true
    immediate: true
    state: enabled
  loop: ["22", "{{ socks_port }}"]

- name: Drop the default world-open SSH service (only client_cidr reaches 22)
  firewalld:
    service: ssh
    permanent: true
    immediate: true
    state: disabled

- name: Disable SSH password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: restart sshd

- name: Enable automatic security updates
  systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started

- name: Enable and start sockd
  systemd:
    name: sockd
    enabled: true
    state: started
